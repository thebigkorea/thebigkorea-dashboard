<style>
  * {
    box-sizing: border-box;
  }

  :root {
    --background: #f4f6f9;
    --surface: #ffffff;
    --border: #e4e8ef;
    --text: #172033;
    --muted: #6b7280;
    --primary: #1f4d8f;
    --primary-dark: #163a6d;
    --gold: #c99a42;
    --danger: #b42318;
    --shadow: 0 10px 30px rgba(25, 36, 61, 0.07);
  }

  body {
    margin: 0;
    background: var(--background);
    color: var(--text);
    font-family:
      "Noto Sans KR",
      "Apple SD Gothic Neo",
      Arial,
      sans-serif;
  }

  button,
  select {
    font: inherit;
  }

  button {
    cursor: pointer;
  }

  .hidden {
    display: none !important;
  }

  .app-shell {
    width: min(1480px, calc(100% - 32px));
    margin: 0 auto;
    padding: 28px 0 60px;
  }

  .hero {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    padding: 32px 36px;
    border-radius: 24px;
    color: #ffffff;
    background:
      linear-gradient(
        135deg,
        #17345e 0%,
        #1f4d8f 62%,
        #2c65ad 100%
      );
    box-shadow: var(--shadow);
  }

  .eyebrow {
    margin: 0 0 10px;
    color: #f3d79a;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.13em;
  }

  .hero h1 {
    margin: 0;
    font-size: clamp(28px, 4vw, 43px);
    line-height: 1.2;
  }

  .hero-description {
    margin: 12px 0 0;
    color: rgba(255, 255, 255, 0.82);
    font-size: 15px;
  }

  .refresh-button {
    min-width: 112px;
    padding: 12px 18px;
    border: 1px solid rgba(255, 255, 255, 0.32);
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.12);
    color: #ffffff;
    font-weight: 700;
  }

  .refresh-button:hover {
    background: rgba(255, 255, 255, 0.2);
  }

  .filter-panel {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr auto;
    gap: 14px;
    align-items: end;
    margin-top: 20px;
    padding: 20px;
    border: 1px solid var(--border);
    border-radius: 18px;
    background: var(--surface);
    box-shadow: var(--shadow);
  }

  .filter-field {
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  .filter-field label {
    color: var(--muted);
    font-size: 13px;
    font-weight: 700;
  }

  .filter-field select {
    width: 100%;
    height: 46px;
    padding: 0 14px;
    border: 1px solid #d8dee8;
    border-radius: 11px;
    background: #ffffff;
    color: var(--text);
    outline: none;
  }

  .filter-field select:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(31, 77, 143, 0.1);
  }

  .primary-button {
    height: 46px;
    padding: 0 28px;
    border: 0;
    border-radius: 11px;
    background: var(--primary);
    color: #ffffff;
    font-weight: 800;
  }

  .primary-button:hover {
    background: var(--primary-dark);
  }

  .loading-box,
  .error-box {
    margin-top: 18px;
    padding: 17px 20px;
    border-radius: 14px;
    background: #ffffff;
    text-align: center;
    font-weight: 700;
  }

  .loading-box {
    color: var(--primary);
    border: 1px solid #dbe7f7;
  }

  .error-box {
    color: var(--danger);
    border: 1px solid #f1c7c4;
    background: #fff7f6;
  }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 16px;
    margin-top: 20px;
  }

  .summary-card {
    min-height: 132px;
    padding: 24px;
    border: 1px solid var(--border);
    border-radius: 18px;
    background: var(--surface);
    box-shadow: var(--shadow);
  }

  .summary-label {
    display: block;
    margin-bottom: 14px;
    color: var(--muted);
    font-size: 14px;
    font-weight: 700;
  }

  .summary-card strong {
    display: block;
    color: var(--text);
    font-size: clamp(23px, 3vw, 32px);
    line-height: 1.2;
    letter-spacing: -0.04em;
  }

  .content-card {
    margin-top: 20px;
    padding: 26px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--surface);
    box-shadow: var(--shadow);
  }

  .section-heading {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 22px;
  }

  .section-kicker {
    display: block;
    margin-bottom: 6px;
    color: var(--gold);
    font-size: 12px;
    font-weight: 900;
    letter-spacing: 0.12em;
  }

  .section-heading h2 {
    margin: 0;
    font-size: 23px;
  }

  .store-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 15px;
  }

  .store-card {
    padding: 20px;
    border: 1px solid var(--border);
    border-radius: 16px;
    background: #fbfcfe;
    transition:
      transform 0.18s ease,
      box-shadow 0.18s ease,
      border-color 0.18s ease;
  }

  .store-card:hover {
    transform: translateY(-2px);
    border-color: #bfcce0;
    box-shadow: 0 10px 24px rgba(25, 36, 61, 0.09);
  }

  .store-card.has-error {
    border-color: #f0c6c3;
    background: #fff8f7;
  }

  .store-card h3 {
    margin: 0 0 18px;
    font-size: 18px;
  }

  .store-metric {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    margin-top: 10px;
    color: var(--muted);
    font-size: 14px;
  }

  .store-metric strong {
    color: var(--text);
    font-size: 14px;
  }

  .store-detail-button {
    width: 100%;
    margin-top: 18px;
    padding: 11px 14px;
    border: 1px solid #ccd6e5;
    border-radius: 10px;
    background: #ffffff;
    color: var(--primary);
    font-weight: 800;
  }

  .store-detail-button:hover {
    border-color: var(--primary);
  }

  .store-error {
    margin: 12px 0 0;
    color: var(--danger);
    font-size: 13px;
    line-height: 1.5;
  }

  .table-wrap {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 14px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 700px;
  }

  th,
  td {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    text-align: right;
    white-space: nowrap;
  }

  th:first-child,
  td:first-child {
    text-align: left;
  }

  th {
    background: #f6f8fb;
    color: #4b5563;
    font-size: 13px;
  }

  td {
    font-size: 14px;
  }

  tbody tr:last-child td {
    border-bottom: 0;
  }

  .vendor-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 13px;
  }

  .vendor-item {
    display: flex;
    justify-content: space-between;
    gap: 18px;
    padding: 16px 18px;
    border: 1px solid var(--border);
    border-radius: 13px;
    background: #fbfcfe;
  }

  .vendor-item span {
    color: var(--muted);
  }

  .vendor-item strong {
    text-align: right;
  }

  .empty-message {
    padding: 28px;
    color: var(--muted);
    text-align: center;
  }

  @media (max-width: 1050px) {
    .summary-grid,
    .store-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .vendor-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }

  @media (max-width: 700px) {
    .app-shell {
      width: min(100% - 20px, 1480px);
      padding-top: 10px;
    }

    .hero {
      align-items: stretch;
      flex-direction: column;
      padding: 25px 22px;
      border-radius: 18px;
    }

    .refresh-button {
      width: 100%;
    }

    .filter-panel {
      grid-template-columns: 1fr 1fr;
    }

    .filter-field:first-child {
      grid-column: 1 / -1;
    }

    .primary-button {
      width: 100%;
    }

    .summary-grid,
    .store-grid,
    .vendor-grid {
      grid-template-columns: 1fr;
    }

    .summary-card {
      min-height: auto;
    }

    .content-card {
      padding: 20px 15px;
    }
  }
  .summary-note {
  display: block;
  margin-top: 10px;
  color: var(--muted);
  font-size: 13px;
  font-weight: 700;
}

.change-up {
  color: #16794b !important;
}

.change-down {
  color: #c2392f !important;
}

.change-flat {
  color: #6b7280 !important;
}

@media (min-width: 1051px) {
  .summary-grid {
    grid-template-columns:
      repeat(3, minmax(0, 1fr));
  }
}
</style>
