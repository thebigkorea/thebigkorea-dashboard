<script>
  let initialData = null;
  let cumulativeSalesChart = null;


  document.addEventListener(
    "DOMContentLoaded",
    function() {
      initializeDashboard();
    }
  );


  function initializeDashboard() {
    setLoading(true);
    hideError();

    google.script.run
      .withSuccessHandler(function(data) {
        initialData = data;

        createStoreOptions(data.stores);
        createYearOptions(data.year);
        createMonthOptions(data.month);

        loadDashboard();
      })
      .withFailureHandler(handleFailure)
      .getInitialData();
  }


  function createStoreOptions(stores) {
    const select = document.getElementById(
      "storeSelect"
    );

    stores.forEach(function(store) {
      const option = document.createElement(
        "option"
      );

      option.value = store.key;
      option.textContent = store.name;

      select.appendChild(option);
    });
  }


  function createYearOptions(currentYear) {
    const select = document.getElementById(
      "yearSelect"
    );

    select.innerHTML = "";

    for (
      let year = currentYear - 2;
      year <= currentYear + 1;
      year++
    ) {
      const option = document.createElement(
        "option"
      );

      option.value = year;
      option.textContent = year + "년";

      if (year === currentYear) {
        option.selected = true;
      }

      select.appendChild(option);
    }
  }


  function createMonthOptions(currentMonth) {
    const select = document.getElementById(
      "monthSelect"
    );

    select.innerHTML = "";

    for (let month = 1; month <= 12; month++) {
      const option = document.createElement(
        "option"
      );

      option.value = month;
      option.textContent = month + "월";

      if (month === currentMonth) {
        option.selected = true;
      }

      select.appendChild(option);
    }
  }


  function loadDashboard(forceRefresh) {
  const storeKey =
    document.getElementById("storeSelect").value;

  const year = Number(
    document.getElementById("yearSelect").value
  );

  const month = Number(
    document.getElementById("monthSelect").value
  );

  const refresh = forceRefresh === true;

  setLoading(true);
  hideError();

  const loadingBox =
    document.getElementById("loadingBox");

  loadingBox.textContent = refresh
    ? "각 지점 원장에서 최신 데이터를 다시 불러오는 중입니다."
    : "데이터를 불러오는 중입니다.";

  google.script.run
    .withSuccessHandler(function(data) {
      renderDashboard(data);
      setLoading(false);

      loadingBox.textContent =
        "데이터를 불러오는 중입니다.";
    })
    .withFailureHandler(handleFailure)
    .getDashboardData(
      storeKey,
      year,
      month,
      refresh
    );
}

function forceRefreshDashboard() {
  loadDashboard(true);
}


  function renderDashboard(data) {
  renderSummary(data.summary);

  renderCumulativeSalesChart(
    data.chartData || [],
    data
  );

  if (data.mode === "all") {
    renderAllStores(data);
    return;
  }

  renderSingleStore(data);
}


  function renderSummary(summary) {
  setText(
    "totalSales",
    formatMoney(summary.totalSales)
  );

  setText(
    "totalPurchases",
    formatMoney(summary.totalPurchases)
  );

  setText(
    "costRate",
    formatPercent(summary.costRate)
  );

  setText(
    "averageSales",
    formatMoney(summary.averageSales)
  );

  setText(
    "previousYearSales",
    formatMoney(summary.previousYearSales)
  );

  const rateElement =
    document.getElementById("yearOnYearRate");

  const differenceElement =
    document.getElementById(
      "yearOnYearDifference"
    );

  const rate =
    Number(summary.yearOnYearRate || 0);

  const difference =
    Number(summary.yearOnYearDifference || 0);

  const previousYearSales =
  Number(summary.previousYearSales || 0);  

  if (previousYearSales <= 0) {
  if (rateElement) {
    rateElement.textContent = "비교 불가";

    rateElement.classList.remove(
      "change-up",
      "change-down",
      "change-flat"
    );

    rateElement.classList.add("change-flat");
  }

  if (differenceElement) {
    differenceElement.textContent =
      "전년도 자료 없음";

    differenceElement.classList.remove(
      "change-up",
      "change-down",
      "change-flat"
    );

    differenceElement.classList.add("change-flat");
  }
} else {
  if (rateElement) {
    rateElement.textContent =
      formatChangeRate(rate);

    rateElement.classList.remove(
      "change-up",
      "change-down",
      "change-flat"
    );

    rateElement.classList.add(
      getChangeClass(rate)
    );
  }

  if (differenceElement) {
    differenceElement.textContent =
      formatChangeMoney(difference);

    differenceElement.classList.remove(
      "change-up",
      "change-down",
      "change-flat"
    );

    differenceElement.classList.add(
      getChangeClass(difference)
    );
  }
}

  const endDay =
    Number(summary.comparisonEndDay || 0);

  setText(
  "comparisonPeriod",
  previousYearSales > 0 && endDay > 0
    ? "1일~" + endDay + "일 기준"
    : "비교 자료 없음"
);
}

function renderCumulativeSalesChart(
  chartRows,
  data
) {
  const canvas = document.getElementById(
    "cumulativeSalesChart"
  );

  const emptyMessage =
    document.getElementById(
      "chartEmptyMessage"
    );

  const title = document.getElementById(
    "salesChartTitle"
  );

  if (!canvas) return;

  if (title) {
    title.textContent =
      (data.storeName || "전체 지점") +
      " · " +
      data.year +
      "년 " +
      data.month +
      "월 누적 매출";
  }

  if (cumulativeSalesChart) {
    cumulativeSalesChart.destroy();
    cumulativeSalesChart = null;
  }

  const rows = Array.isArray(chartRows)
    ? chartRows
    : [];

  if (!rows.length) {
    canvas.classList.add("hidden");

    if (emptyMessage) {
      emptyMessage.classList.remove("hidden");
    }

    return;
  }

  canvas.classList.remove("hidden");

  if (emptyMessage) {
    emptyMessage.classList.add("hidden");
  }

  const labels = rows.map(function(row) {
    return row.label;
  });

  const currentSales = rows.map(function(row) {
    return Number(row.currentSales || 0);
  });

  const previousSales = rows.map(function(row) {
    return Number(row.previousSales || 0);
  });

  cumulativeSalesChart = new Chart(
    canvas,
    {
      type: "line",

      data: {
        labels: labels,

        datasets: [
          {
            label: data.year + "년 누적 매출",
            data: currentSales,
            borderColor: "#1f4d8f",
            backgroundColor:
              "rgba(31, 77, 143, 0.10)",
            borderWidth: 3,
            pointRadius: 3,
            pointHoverRadius: 6,
            tension: 0.28,
            fill: true
          },

          {
            label:
              (Number(data.year) - 1) +
              "년 동기간 누적 매출",

            data: previousSales,
            borderColor: "#c99a42",
            backgroundColor:
              "rgba(201, 154, 66, 0.05)",
            borderWidth: 2,
            borderDash: [7, 5],
            pointRadius: 2,
            pointHoverRadius: 5,
            tension: 0.28,
            fill: false
          }
        ]
      },

      options: {
        responsive: true,
        maintainAspectRatio: false,

        interaction: {
          mode: "index",
          intersect: false
        },

        plugins: {
          legend: {
            position: "top",
            align: "end",

            labels: {
              usePointStyle: true,
              boxWidth: 9,
              padding: 18,
              font: {
                family:
                  "'Noto Sans KR', sans-serif",
                size: 12,
                weight: "700"
              }
            }
          },

          tooltip: {
            callbacks: {
              label: function(context) {
                return (
                  context.dataset.label +
                  ": " +
                  formatMoney(context.raw)
                );
              }
            }
          }
        },

        scales: {
          x: {
            grid: {
              display: false
            },

            ticks: {
              maxRotation: 0,
              autoSkip: true,
              maxTicksLimit: 16
            }
          },

          y: {
            beginAtZero: true,

            grid: {
              color: "rgba(107, 114, 128, 0.12)"
            },

            ticks: {
              callback: function(value) {
                return formatCompactMoney(value);
              }
            }
          }
        }
      }
    }
  );
}


function formatCompactMoney(value) {
  const number = Number(value || 0);
  const absolute = Math.abs(number);

  if (absolute >= 100000000) {
    return (
      (number / 100000000).toFixed(1) +
      "억"
    );
  }

  if (absolute >= 10000) {
    return (
      Math.round(number / 10000) +
      "만"
    );
  }

  return new Intl.NumberFormat(
    "ko-KR"
  ).format(number);
}


  function renderAllStores(data) {
    showElement("storeSection");
    hideElement("dailySection");
    hideElement("vendorSection");

    const grid = document.getElementById(
      "storeGrid"
    );

    if (!data.stores.length) {
      grid.innerHTML =
        '<div class="empty-message">' +
        "조회된 지점 정보가 없습니다." +
        "</div>";

      return;
    }

    grid.innerHTML = data.stores
      .map(function(store) {
        if (store.error) {
          return `
            <article class="store-card has-error">
              <h3>${escapeHtml(store.shortName)}</h3>

              <p class="store-error">
                ${escapeHtml(store.error)}
              </p>
            </article>
          `;
        }

        return `
          <article class="store-card">

            <h3>${escapeHtml(store.shortName)}</h3>

            <div class="store-metric">
              <span>매출 누계</span>
              <strong>
                ${formatMoney(store.totalSales)}
              </strong>
            </div>

            <div class="store-metric">
              <span>매입 누계</span>
              <strong>
                ${formatMoney(store.totalPurchases)}
              </strong>
            </div>

            <div class="store-metric">
              <span>원가율</span>
              <strong>
                ${formatPercent(store.costRate)}
              </strong>
            </div>

            <div class="store-comparison">

  <div class="store-metric">
    <span>전년도 동기간</span>

    <strong>
      ${
        store.previousYearSales > 0
          ? formatMoney(store.previousYearSales)
          : "비교 불가"
      }
    </strong>
  </div>

  <div class="store-metric">
    <span>전년 대비</span>

    <div class="store-change-value">

      <strong class="${
        store.previousYearSales > 0
          ? getChangeClass(store.yearOnYearRate)
          : "change-flat"
      }">
        ${
          store.previousYearSales > 0
            ? formatChangeRate(store.yearOnYearRate)
            : "비교 불가"
        }
      </strong>

      <small class="${
        store.previousYearSales > 0
          ? getChangeClass(
              store.yearOnYearDifference
            )
          : "change-flat"
      }">
        ${
          store.previousYearSales > 0
            ? formatChangeMoney(
                store.yearOnYearDifference
              )
            : "전년도 자료 없음"
        }
      </small>

    </div>

  </div>

</div>

            <button
              type="button"
              class="store-detail-button"
              onclick="openStoreDetail('${store.key}')">
              상세보기
            </button>

          </article>
        `;
      })
      .join("");
  }


  function renderSingleStore(data) {
    hideElement("storeSection");
    showElement("dailySection");
    showElement("vendorSection");

    setText(
      "dailyTitle",
      data.storeName +
      " · " +
      data.year +
      "년 " +
      data.month +
      "월"
    );

    renderDailyTable(data.daily);
    renderVendors(data.vendors);
  }


  function renderDailyTable(rows) {
    const tbody = document.getElementById(
      "dailyBody"
    );

    if (!rows.length) {
      tbody.innerHTML = `
        <tr>
          <td
            colspan="4"
            class="empty-message">
            해당 월의 매출·매입 자료가 없습니다.
          </td>
        </tr>
      `;

      return;
    }

    tbody.innerHTML = rows
      .map(function(row) {
        return `
          <tr>
            <td>${escapeHtml(row.dateLabel)}</td>
            <td>${formatMoney(row.sales)}</td>
            <td>${formatMoney(row.purchases)}</td>
            <td>${formatPercent(row.costRate)}</td>
          </tr>
        `;
      })
      .join("");
  }


  function renderVendors(vendors) {
    const grid = document.getElementById(
      "vendorGrid"
    );

    if (!vendors.length) {
      grid.innerHTML = `
        <div class="empty-message">
          해당 월의 거래처 매입 자료가 없습니다.
        </div>
      `;

      return;
    }

    grid.innerHTML = vendors
      .map(function(vendor) {
        return `
          <article class="vendor-item">
            <span>${escapeHtml(vendor.name)}</span>

            <strong>
              ${formatMoney(vendor.amount)}
            </strong>
          </article>
        `;
      })
      .join("");
  }


  function openStoreDetail(storeKey) {
    document.getElementById(
      "storeSelect"
    ).value = storeKey;

    loadDashboard();

    window.scrollTo({
      top: 0,
      behavior: "smooth"
    });
  }


  function formatMoney(value) {
    const number = Number(value || 0);

    return new Intl.NumberFormat(
      "ko-KR"
    ).format(number) + "원";
  }


  function formatPercent(value) {
    return Number(value || 0).toFixed(1) + "%";
  }

  function formatChangeRate(value) {
  const number = Number(value || 0);

  if (number > 0) {
    return "▲ " + number.toFixed(1) + "%";
  }

  if (number < 0) {
    return "▼ " +
      Math.abs(number).toFixed(1) +
      "%";
  }

  return "― 0.0%";
}


function formatChangeMoney(value) {
  const number = Number(value || 0);

  if (number > 0) {
    return "전년보다 " +
      formatMoney(number) +
      " 증가";
  }

  if (number < 0) {
    return "전년보다 " +
      formatMoney(Math.abs(number)) +
      " 감소";
  }

  return "전년과 동일";
}


function getChangeClass(value) {
  const number = Number(value || 0);

  if (number > 0) {
    return "change-up";
  }

  if (number < 0) {
    return "change-down";
  }

  return "change-flat";
}


  function setText(id, text) {
    const element = document.getElementById(id);

    if (element) {
      element.textContent = text;
    }
  }


  function showElement(id) {
    const element = document.getElementById(id);

    if (element) {
      element.classList.remove("hidden");
    }
  }


  function hideElement(id) {
    const element = document.getElementById(id);

    if (element) {
      element.classList.add("hidden");
    }
  }


  function setLoading(isLoading) {
    const loadingBox = document.getElementById(
      "loadingBox"
    );

    const content = document.getElementById(
      "dashboardContent"
    );

    if (isLoading) {
      loadingBox.classList.remove("hidden");
      content.style.opacity = "0.45";
      content.style.pointerEvents = "none";
    } else {
      loadingBox.classList.add("hidden");
      content.style.opacity = "1";
      content.style.pointerEvents = "";
    }
  }


  function handleFailure(error) {
    setLoading(false);

    const message =
      error && error.message
        ? error.message
        : String(error || "알 수 없는 오류");

    const box = document.getElementById(
      "errorBox"
    );

    box.textContent =
      "조회 오류: " + message;

    box.classList.remove("hidden");
  }


  function hideError() {
    const box = document.getElementById(
      "errorBox"
    );

    box.textContent = "";
    box.classList.add("hidden");
  }


  function escapeHtml(value) {
    return String(value || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }
</script>
